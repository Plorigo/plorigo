syntax = "proto3";

package controlplane.v1;

// A Connection is one integration: a workspace's link to a Git provider account (kind "oauth") or
// App installation (kind "app"). A workspace may have many. Metadata only — the OAuth access token
// and App installation tokens are never returned by any RPC (write-only, cf. Secret). See
// docs/architecture/security.md.
message Connection {
  string id = 1;
  string workspace_id = 2;
  string provider = 3;       // "github" (future: "gitlab")
  string kind = 4;           // "oauth" | "app"
  string account_login = 5;  // the connected account/org login
  int64 account_id = 6;      // the provider's numeric account id (0 when unknown)
  string installation_id = 7; // App connections only (non-secret id)
  string scopes = 8;          // OAuth connections only
  string connected_by = 9;    // user id that authorized the connection
  string created_at = 10;     // RFC 3339
  string updated_at = 11;     // RFC 3339
}

// ProviderStatus reports, per provider, what the SERVER has configured, so the dashboard offers the
// right connect actions (and shows providers that exist but aren't configured).
message ProviderStatus {
  string provider = 1;          // "github"
  string display_name = 2;      // "GitHub"
  bool oauth_configured = 3;     // server has OAuth client id/secret
  bool app_configured = 4;       // server has an App (env or registered)
  bool available = 5;            // provider implemented at all
}

// A Repository is a candidate repo a connection can access, returned by ListRepositories so the
// dashboard can offer a picker. It is not persisted.
message Repository {
  string owner = 1;
  string name = 2;
  string full_name = 3;
  string default_branch = 4;
  bool is_private = 5;
  string html_url = 6;
  string description = 7;
}

message ListConnectionsRequest {
  string workspace_id = 1;
}

message ListConnectionsResponse {
  repeated Connection connections = 1;
  repeated ProviderStatus providers = 2;
}

message ListRepositoriesRequest {
  string connection_id = 1;
  string query = 2; // optional case-insensitive filter on full_name
  int32 page = 3;   // 1-based; 0 means the first page
}

message ListRepositoriesResponse {
  repeated Repository repositories = 1;
}

message ListBranchesRequest {
  string connection_id = 1;
  string owner = 2;
  string repo = 3;
}

message ListBranchesResponse {
  repeated string branches = 1;
}

message DisconnectConnectionRequest {
  string connection_id = 1;
}

message DisconnectConnectionResponse {}

// SourceService manages a workspace's Git provider integrations (multiple per workspace, across
// providers) and surfaces the repositories + branches each connection can access, for the
// dashboard's pickers. Tokens are sealed/minted server-side and never returned by any RPC. Connecting
// a repository to a SERVICE lives in ServiceService (the repo + chosen connection are folded onto the
// service). The browser connect begin/callback steps are plain HTTP endpoints (e.g.
// /api/github/connect, /api/github/app/install), not RPCs, because they set cookies and redirect.
// See docs/architecture/security.md and sources.md.
service SourceService {
  rpc ListConnections(ListConnectionsRequest) returns (ListConnectionsResponse);
  rpc ListRepositories(ListRepositoriesRequest) returns (ListRepositoriesResponse);
  rpc ListBranches(ListBranchesRequest) returns (ListBranchesResponse);
  rpc DisconnectConnection(DisconnectConnectionRequest) returns (DisconnectConnectionResponse);
}
