syntax = "proto3";

package controlplane.v1;

// The dashboard-facing backups API. A Backup is one attempt to capture a managed Postgres
// database service's data with pg_dump, run by the database's server agent and stored on the
// server (local disk for the MVP; an S3-compatible destination is a later slice). The agent-facing
// side is agent.v1.BackupService. See docs/architecture/backups.md.
message Backup {
  string id = 1;
  string service_id = 2;
  string environment_id = 3;
  string project_id = 4;
  string workspace_id = 5;
  string server_id = 6;
  string destination = 7;  // "local" (S3 later)
  string artifact_uri = 8; // where the dump lives on the server
  int64 size_bytes = 9;
  string checksum = 10;    // sha256 of the artifact
  string status = 11;      // queued|assigned|dumping|uploading|verifying|succeeded|failed
  string message = 12;
  string error = 13;
  string created_at = 14;  // RFC 3339
  string updated_at = 15;  // RFC 3339
  string label = 16;       // optional operator-typed name, to tell backups apart
  string trigger_source = 17; // who started it: "manual" (dashboard) or "scheduled" (later slice)
}

message CreateBackupRequest {
  string service_id = 1;
  string label = 2; // optional name for the backup ("before v2 migration"); trimmed, may be empty
}

message CreateBackupResponse {
  Backup backup = 1;
}

message GetBackupRequest {
  string id = 1;
}

message GetBackupResponse {
  Backup backup = 1;
}

message ListBackupsByServiceRequest {
  string service_id = 1;
}

message ListBackupsByServiceResponse {
  repeated Backup backups = 1;
}

// A RestoreJob restores a succeeded backup back into its database service. It is the proof that a
// backup is usable — a backup is only valuable if restore works (see docs/architecture/backups.md).
message RestoreJob {
  string id = 1;
  string backup_id = 2;
  string service_id = 3;
  string environment_id = 4;
  string project_id = 5;
  string workspace_id = 6;
  string server_id = 7;
  string status = 8; // queued|assigned|restoring|verifying|succeeded|failed
  string message = 9;
  string error = 10;
  string created_at = 11; // RFC 3339
  string updated_at = 12; // RFC 3339
}

message RestoreBackupRequest {
  string backup_id = 1;
}

message RestoreBackupResponse {
  RestoreJob restore = 1;
}

message ListRestoreJobsByServiceRequest {
  string service_id = 1;
}

message ListRestoreJobsByServiceResponse {
  repeated RestoreJob restores = 1;
}

// BackupService creates and reports backups for managed database services. CreateBackup is
// policy-authorized (ActionBackupCreate); reads require ActionBackupRead.
service BackupService {
  rpc CreateBackup(CreateBackupRequest) returns (CreateBackupResponse);
  rpc GetBackup(GetBackupRequest) returns (GetBackupResponse);
  rpc ListBackupsByService(ListBackupsByServiceRequest) returns (ListBackupsByServiceResponse);
  // RestoreBackup restores a succeeded backup into its database service. Authorized with
  // ActionBackupCreate (it mutates database data, so it is a create-tier action).
  rpc RestoreBackup(RestoreBackupRequest) returns (RestoreBackupResponse);
  rpc ListRestoreJobsByService(ListRestoreJobsByServiceRequest) returns (ListRestoreJobsByServiceResponse);
}
