syntax = "proto3";

package controlplane.v1;

// A Secret is an encrypted, per-environment configuration value. Unlike an EnvVar,
// the value is encrypted at rest and is WRITE-ONLY: it is accepted on SetSecret but
// never returned by any RPC, so Secret carries only metadata (key + timestamps). See
// docs/architecture/security.md and data-and-api.md.
message Secret {
  string id = 1;
  string environment_id = 2;
  string key = 3;
  string created_at = 4; // RFC 3339
  string updated_at = 5; // RFC 3339
}

message SetSecretRequest {
  string environment_id = 1;
  string key = 2;
  // The plaintext value. It is encrypted before storage and never returned again.
  string value = 3;
}

message SetSecretResponse {
  // Metadata only — never the value.
  Secret secret = 1;
}

message ListSecretsRequest {
  string environment_id = 1;
}

message ListSecretsResponse {
  // Metadata only — keys and timestamps, never values.
  repeated Secret secrets = 1;
}

message DeleteSecretRequest {
  string environment_id = 1;
  string key = 2;
}

message DeleteSecretResponse {}

// SecretService manages encrypted, write-only per-environment secrets. SetSecret
// upserts (create-or-update) by (environment_id, key); the value is encrypted at
// rest and is never returned by ListSecrets (which yields metadata only).
service SecretService {
  rpc SetSecret(SetSecretRequest) returns (SetSecretResponse);
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse);
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);
}
