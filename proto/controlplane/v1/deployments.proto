syntax = "proto3";

package controlplane.v1;

// A Deployment is one attempt to run a SERVICE in an environment on a connected server.
// The control plane records it as `queued`; the server's agent claims it and reports
// progress. There are two source kinds: an `image` deployment pulls a PRE-BUILT image;
// a `git` deployment clones a repo and builds its Dockerfile on the server first. See
// docs/architecture/deployment-engine.md and agent.md. SSL/custom domains are later slices.
message Deployment {
  string id = 1;
  string environment_id = 2;
  string project_id = 3;   // denormalized from the service (not re-resolved)
  string workspace_id = 4;
  string server_id = 5;
  string image_ref = 6;    // the pre-built image (image deployments); empty for git
  int32 container_port = 7; // the port the app listens on inside the container
  int32 host_port = 8;      // the published host port (0 until the agent binds it)
  string status = 9;        // queued|assigned|cloning|building|pulling|starting|routing|running|failed|superseded
  string message = 10;      // latest human-readable status line
  string created_at = 11;   // RFC 3339
  string updated_at = 12;   // RFC 3339
  // Build-from-Git fields. source_kind is "image" or "git"; the rest are set only for
  // git deployments. commit_sha and built_image_ref are filled by the agent after a
  // successful clone/build.
  string source_kind = 13;   // "image" | "git"
  string source_access = 14; // "" | "public" (this slice builds public repos only)
  string clone_url = 15;     // the repo clone URL (git deployments)
  string git_ref = 16;       // the branch/tag built (git deployments)
  string commit_sha = 17;    // the exact commit the agent built
  string built_image_ref = 18; // the local image tag the agent produced
  string route_url = 19;      // the real deployment URL (public services only; empty for private)
  string service_id = 20;     // the owning service (its source, port, and visibility)
}

// A DeploymentEvent is one entry in a deployment's timeline: either a status
// transition (kind="status") or a log line (kind="log"). seq is monotonic
// per deployment so the dashboard can fetch incrementally.
message DeploymentEvent {
  string id = 1;
  string deployment_id = 2;
  int64 seq = 3;
  string kind = 4;   // "status" | "log"
  string status = 5; // set when kind="status"
  string message = 6;
  string created_at = 7; // RFC 3339
  // For kind="log", which stream the line came from: "build" (clone/build/pull/start
  // output) or "runtime" (the container's stdout/stderr). Empty for status events and
  // for legacy rows recorded before streams were distinguished.
  string stream = 8;
}

// CreateDeploymentForService deploys (or redeploys) an existing service: the control plane
// resolves the service's source server-side — a pre-built image, or a PUBLIC git repo it
// clones and builds — so a caller can't smuggle a private URL through. container_port and
// git_ref are optional overrides; empty/0 means use the service's configured port and
// branch. Non-secret env vars are NOT passed here: the agent injects the service's
// configured env_vars at run time (see agent.v1.DeployService.PollDeployment).
message CreateDeploymentForServiceRequest {
  string service_id = 1;
  string server_id = 2;
  int32 container_port = 3; // optional override; 0 = the service's configured port
  string git_ref = 4;       // optional branch/tag; empty = the service's branch/default
}

message CreateDeploymentForServiceResponse {
  Deployment deployment = 1;
}

message ListDeploymentsByServiceRequest {
  string service_id = 1;
}

message ListDeploymentsByServiceResponse {
  repeated Deployment deployments = 1;
}

message GetDeploymentRequest {
  string id = 1;
}

message GetDeploymentResponse {
  Deployment deployment = 1;
}

message ListDeploymentsByEnvironmentRequest {
  string environment_id = 1;
}

message ListDeploymentsByEnvironmentResponse {
  repeated Deployment deployments = 1;
}

message ListDeploymentsByProjectRequest {
  string project_id = 1;
}

message ListDeploymentsByProjectResponse {
  repeated Deployment deployments = 1;
}

message ListDeploymentsByWorkspaceRequest {
  string workspace_id = 1;
}

message ListDeploymentsByWorkspaceResponse {
  repeated Deployment deployments = 1;
}

message ListDeploymentEventsRequest {
  string deployment_id = 1;
  int64 after_seq = 2; // return events with seq greater than this (0 = from start)
}

message ListDeploymentEventsResponse {
  repeated DeploymentEvent events = 1;
}

// DeploymentService is the dashboard-facing API: trigger a deployment of a service, read
// its status and timeline, and list deployments by service, environment, project, or
// workspace. Every RPC is session/token-authenticated and policy-authorized (the
// agent-facing claim/report side is agent.v1.DeployService). The first deploy of a brand
// new service is enqueued by ServiceService.CreateService (deploy_now); this RPC is for
// redeploying an existing service.
service DeploymentService {
  rpc CreateDeploymentForService(CreateDeploymentForServiceRequest) returns (CreateDeploymentForServiceResponse);
  rpc GetDeployment(GetDeploymentRequest) returns (GetDeploymentResponse);
  rpc ListDeploymentsByService(ListDeploymentsByServiceRequest) returns (ListDeploymentsByServiceResponse);
  rpc ListDeploymentsByEnvironment(ListDeploymentsByEnvironmentRequest) returns (ListDeploymentsByEnvironmentResponse);
  rpc ListDeploymentsByProject(ListDeploymentsByProjectRequest) returns (ListDeploymentsByProjectResponse);
  rpc ListDeploymentsByWorkspace(ListDeploymentsByWorkspaceRequest) returns (ListDeploymentsByWorkspaceResponse);
  rpc ListDeploymentEvents(ListDeploymentEventsRequest) returns (ListDeploymentEventsResponse);
}
