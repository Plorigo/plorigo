version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/plorigo/plorigo/proto/gen
plugins:
  # Go messages + ConnectRPC handlers/clients -> proto/gen (gitignored, regenerated).
  # Pinned to match the runtimes in go.mod — bump both together
  # (generated code requires runtime >= plugin version):
  #   protocolbuffers/go  <-> google.golang.org/protobuf
  #   connectrpc/go       <-> connectrpc.com/connect
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: gen
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go:v1.20.0
    out: gen
    opt: paths=source_relative
  # TypeScript (protobuf-es v2 includes service descriptors used by connect-es) -> dashboard.
  # Pinned to match the @bufbuild/protobuf runtime in apps/web/package.json — bump both
  # together (generated code requires runtime >= plugin version).
  - remote: buf.build/bufbuild/es:v2.12.0
    out: ../apps/web/src/gen
    opt: target=ts
