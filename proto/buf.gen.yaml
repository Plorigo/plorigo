version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/plorigo/plorigo/proto/gen
plugins:
  # Go messages + ConnectRPC handlers/clients -> proto/gen (gitignored, regenerated).
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go
    out: gen
    opt: paths=source_relative
  # TypeScript (protobuf-es v2 includes service descriptors used by connect-es) -> dashboard.
  - remote: buf.build/bufbuild/es
    out: ../apps/web/src/gen
    opt: target=ts
