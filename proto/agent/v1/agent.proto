syntax = "proto3";

package agent.v1;

// AgentService is the agent-facing gateway: a Plorigo server agent calls it
// OUTBOUND to register and to send heartbeats. These RPCs are not authenticated by
// a user session or API token — the agent proves itself with its one-time
// registration token (Register) and its durable agent credential (Heartbeat), both
// validated in the service. See docs/architecture/agent.md. The control-plane,
// user-facing side (mint token, list agents) is controlplane.v1.AgentService.
service AgentService {
  // Register exchanges a one-time registration token (embedded in the install
  // command) for a durable agent credential, recording the agent's ed25519 public
  // key. It is idempotent per server: re-running install rotates the credential.
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Heartbeat reports that the agent is alive and which version it runs; the control
  // plane derives the server's online/offline state from the last heartbeat.
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

message RegisterRequest {
  string registration_token = 1;
  bytes public_key = 2; // ed25519 public key generated on install
  string agent_version = 3;
}

message RegisterResponse {
  string agent_id = 1;
  string credential = 2; // durable agent credential, returned only once
}

message HeartbeatRequest {
  string agent_id = 1;
  string credential = 2;
  string agent_version = 3;

  // Compatibility facts the agent reports on every beat so the control plane can derive
  // server readiness (see docs/architecture/agent.md). They expose nothing sensitive:
  // whether the Docker daemon is reachable, its version, and the host's OS/arch. A
  // non-empty os marks a health-reporting agent — the control plane uses it to tell
  // "Docker unavailable" apart from "this agent predates health reporting".
  bool docker_available = 4;
  string docker_version = 5; // daemon version; empty when Docker is unreachable
  string os = 6; // host GOOS (e.g. "linux")
  string arch = 7; // host GOARCH (e.g. "amd64")

  // Extended host-readiness facts (PLO-95): whether the Caddy reverse proxy is installed and
  // serving, plus coarse host resources. They expose nothing sensitive. A non-zero cpu_count
  // marks an agent that reports these — older agents send 0/false and the control plane skips
  // the Caddy/disk/memory readiness checks rather than raising false alarms.
  bool caddy_available = 8; // the caddy binary is installed
  bool caddy_running = 9; // caddy's admin API is reachable (it is serving traffic)
  string caddy_version = 10; // caddy version; empty when unknown
  int64 disk_total_bytes = 11; // total bytes on the data-dir filesystem; 0 when unknown
  int64 disk_free_bytes = 12; // free bytes available to the agent; 0 when unknown
  int64 mem_total_bytes = 13; // total host memory; 0 when unknown
  int64 mem_available_bytes = 14; // memory available without swapping; 0 when unknown
  uint32 cpu_count = 15; // logical CPUs; 0 means extended facts are not reported
}

message HeartbeatResponse {
  // next_interval_seconds tells the agent how long to wait before its next heartbeat.
  int64 next_interval_seconds = 1;
}
