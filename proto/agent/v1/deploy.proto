syntax = "proto3";

package agent.v1;

// DeployService is the agent-facing dispatch gateway: a Plorigo server agent calls
// it OUTBOUND to claim deployment work and report progress. Like agent.v1.AgentService,
// these RPCs are not authenticated by a user session — the agent proves itself with
// its durable agent credential (the same credential used for Heartbeat), validated in
// the deployments service, which also scopes work to the agent's own server. See
// docs/architecture/agent.md. The dashboard-facing side is controlplane.v1.DeploymentService.
//
// This first slice authenticates with the agent credential and per-agent scoping;
// full cryptographic job signing (control plane signs the job, agent signs its poll
// with its stored ed25519 key) is the next hardening step.
service DeployService {
  // PollDeployment atomically claims the next queued deployment for this agent's
  // server, if any. has_work is false when there is nothing to do.
  rpc PollDeployment(PollDeploymentRequest) returns (PollDeploymentResponse);

  // ReportDeployment records a status transition and any new runtime log lines for a
  // deployment the agent is executing.
  rpc ReportDeployment(ReportDeploymentRequest) returns (ReportDeploymentResponse);

  // SyncRoutes lets the outbound agent ask the control plane for verified custom hostnames
  // that should be routed to the services it is currently running. The agent applies the
  // returned desired state to Caddy and reports the result with ReportRouteSync.
  rpc SyncRoutes(SyncRoutesRequest) returns (SyncRoutesResponse);

  // ReportRouteSync records whether the latest Caddy route sync activated or failed the
  // custom domains returned by SyncRoutes.
  rpc ReportRouteSync(ReportRouteSyncRequest) returns (ReportRouteSyncResponse);
}

message PollDeploymentRequest {
  string agent_id = 1;
  string credential = 2;
}

message PollDeploymentResponse {
  bool has_work = 1;
  string deployment_id = 2;
  string image_ref = 3; // set for image deployments; empty for git (built on the server)
  int32 container_port = 4;
  map<string, string> env = 5;
  // app_label is the stable identifier the agent stamps on the container (the SERVICE id)
  // so a redeploy can find and replace this service's previous container, and so two
  // services in one environment never collide on the same Caddy route host.
  string app_label = 6;
  // Build-from-Git fields, set only when source_kind == "git". The agent clones
  // clone_url at git_ref, builds the Dockerfile to built_image_tag, then runs that tag.
  // A PUBLIC repo carries no credential (anonymous clone); a PRIVATE repo backed by the
  // GitHub App carries a short-lived installation token in git_credential (below).
  string source_kind = 7;      // "image" | "git"
  string clone_url = 8;        // the repo to clone (git)
  string git_ref = 9;          // the branch/tag to build (git)
  string built_image_tag = 10; // the local tag the agent should build to and run (git)
  // Visibility + internal networking. A "public" service is published on a host port and
  // gets a Caddy route + public URL; a "private" service is reachable only by sibling
  // services. Every service joins network_name (one per environment) with network_alias
  // (its slug), so a sibling resolves it at http://{network_alias}:{container_port}.
  string visibility = 11;    // "public" | "private"
  string network_name = 12;  // the per-environment Docker network to attach the container to
  string network_alias = 13; // the service's DNS alias on that network (its slug)
  // Optional basic-auth for a PROTECTED PREVIEW's Caddy route. basic_auth_hash is a bcrypt hash
  // (never the plaintext password); when set the agent renders a basic_auth block requiring
  // basic_auth_user + that hash on the preview's route. Empty for production and unprotected previews.
  string basic_auth_user = 14;
  string basic_auth_hash = 15;
  // The DNS label for the PUBLIC route host, distinct from app_label (which keys the
  // container-replacement group + teardown). For a PREVIEW this is a human-readable label
  // ({slug}-pr-{n}-{hash}) so the URL reads nicely; empty for production, where the agent uses
  // app_label (the service id) for the host exactly as before.
  string route_host = 16;
  // Short-lived git credential for cloning a PRIVATE repo, set only when source_kind == "git"
  // and the service is backed by a GitHub App installation. It is a GitHub App installation
  // access token (GitHub expires it within the hour), minted per claim by the control plane and
  // used by the agent as the password of an x-access-token basic-auth on the clone — never
  // embedded in clone_url, never logged, never persisted. Empty for public repos.
  string git_credential = 17;
}

message ReportDeploymentRequest {
  string agent_id = 1;
  string credential = 2;
  string deployment_id = 3;
  string status = 4;             // cloning|building|pulling|starting|healthcheck|routing|running|failed
  int32 host_port = 5;           // set once the container is bound (0 otherwise)
  string container_id = 6;       // set once the container is created
  repeated string log_lines = 7; // new clone/build/runtime log lines since the last report
  string message = 8;            // human-readable status line
  string commit_sha = 9;         // the exact commit built (git deployments)
  string built_image_ref = 10;   // the local image tag the agent built (git deployments)
  // Which stream this report's log_lines belong to: "build" (the agent's clone/build/pull/
  // start output) or "runtime" (the container's stdout/stderr). Empty when the report
  // carries no logs. The control plane stamps each stored log line with it.
  string log_stream = 11;
  // The real deployment URL (e.g. http://{service-id}.localhost:8083), set once the agent
  // has computed the route for a PUBLIC service. Empty for a private service (no route).
  // The control plane stores it on the deployment and the service so the dashboard can show it.
  string route_url = 12;
}

message ReportDeploymentResponse {}

message ManagedRoute {
  string service_id = 1;
  string deployment_id = 2;
  int32 host_port = 3;
}

message RouteOverride {
  string service_id = 1;
  repeated string hostnames = 2;
}

message SyncRoutesRequest {
  string agent_id = 1;
  string credential = 2;
  repeated ManagedRoute routes = 3;
}

message SyncRoutesResponse {
  repeated RouteOverride overrides = 1;
}

message RouteSyncResult {
  string service_id = 1;
  repeated string hostnames = 2;
  bool ok = 3;
  string message = 4;
  string deployment_id = 5;
}

message ReportRouteSyncRequest {
  string agent_id = 1;
  string credential = 2;
  repeated RouteSyncResult results = 3;
}

message ReportRouteSyncResponse {}
