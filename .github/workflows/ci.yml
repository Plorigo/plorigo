name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Generate code (proto + sqlc)
        run: make generate

      - name: Go build
        run: go build ./...

      - name: Go test
        run: go test ./...

      - name: Go lint (golangci-lint incl. depguard module boundaries)
        run: go tool golangci-lint run

      - name: Proto lint
        run: cd proto && go tool buf lint

      - name: Web install
        run: pnpm install --frozen-lockfile

      - name: Web lint
        run: pnpm --dir apps/web lint

      - name: Web build
        run: pnpm --dir apps/web build

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: plorigo
          POSTGRES_PASSWORD: plorigo
          POSTGRES_DB: plorigo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plorigo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://plorigo:plorigo@localhost:5432/plorigo?sslmode=disable
      APP_MASTER_KEY: ci-test-key-not-a-secret
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Apply migrations
        run: make migrate

      - name: Integration test (real Postgres)
        run: go test -tags integration ./internal/app/...
