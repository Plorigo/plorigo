name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          # packageManager lives in apps/web/package.json (no root package.json).
          package_json_file: apps/web/package.json
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Generate code (proto + sqlc)
        run: make generate

      # proto/gen and apps/web/src/gen are git-ignored (regenerated fresh, can't drift),
      # so the only committed generated artifact is the sqlc package. Fail the build if it
      # doesn't match what `sqlc generate` produces from the current migrations/queries —
      # this is what makes CI the authoritative gate for generated-code consistency.
      - name: Verify generated SQL is committed and up to date
        run: |
          if ! git diff --exit-code -- internal/platform/database/db; then
            echo "::error::Committed sqlc output in internal/platform/database/db is out of date. Run 'make generate' and commit the changes."
            exit 1
          fi

      - name: Go build
        run: go build ./...

      - name: Go test
        run: go test ./...

      - name: Go lint (golangci-lint incl. depguard module boundaries)
        run: go tool golangci-lint run

      - name: Proto lint
        run: cd proto && go tool buf lint

      - name: Web install
        run: pnpm install --frozen-lockfile

      - name: Web lint
        run: pnpm --dir apps/web lint

      - name: Web build
        run: pnpm --dir apps/web build

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: plorigo
          POSTGRES_PASSWORD: plorigo
          POSTGRES_DB: plorigo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plorigo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://plorigo:plorigo@localhost:5432/plorigo?sslmode=disable
      # Must be a base64-encoded 32-byte key (decodes to "plorigo-dev-only-not-a-secret-32");
      # the control plane fails to start otherwise. Throwaway CI key — not a real secret.
      APP_MASTER_KEY: cGxvcmlnby1kZXYtb25seS1ub3QtYS1zZWNyZXQtMzI=
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v5
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # internal/app transitively imports the generated ConnectRPC code (proto/gen),
      # which is git-ignored, so it must be generated before the test compiles.
      - name: Generate code (proto + sqlc)
        run: make generate

      - name: Apply migrations
        run: make migrate

      - name: Integration test (real Postgres)
        run: go test -tags integration ./internal/app/...

      # Run AFTER the integration test so the destructive down paths (e.g. clearing
      # NULL-workspace audit rows before restoring NOT NULL) are exercised against real
      # data, then re-apply to prove the migrations are reversible.
      - name: Migration down/up roundtrip
        run: |
          go tool goose -dir migrations postgres "$DATABASE_URL" down-to 0
          go tool goose -dir migrations postgres "$DATABASE_URL" up
