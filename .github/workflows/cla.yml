name: CLA Assistant

# Asks first-time contributors to sign the Contributor License Agreement (CLA.md).
# The signing step only runs once the PERSONAL_ACCESS_TOKEN secret is configured, so this
# workflow stays neutral (no failing checks) until CLA enforcement is turned on.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write # needed so the bot can store signatures on the cla-signatures branch
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    env:
      HAS_PAT: ${{ secrets.PERSONAL_ACCESS_TOKEN != '' }}
    if: >
      github.event_name == 'pull_request_target' ||
      github.event.comment.body == 'recheck' ||
      github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
    steps:
      - name: CLA Assistant
        if: env.HAS_PAT == 'true'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/Plorigo/plorigo/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "ismatBabirli,dependabot[bot],*[bot]"
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA ✍️ ✅"
