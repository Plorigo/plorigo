name: Dependency Review

# Scans pull requests for newly-introduced dependencies with known vulnerabilities
# or disallowed licenses. Safe to run now: with no manifests it simply finds nothing.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
