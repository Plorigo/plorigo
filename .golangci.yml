version: "2"

linters:
  default: standard
  enable:
    - depguard
    - revive
    - errcheck
    - misspell
  settings:
    errcheck:
      # Privileged operations must never silently ignore errors (security). Writes to
      # stdout/CLI output are not security-relevant, so the fmt.Fprint* family is excluded.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    depguard:
      rules:
        # The sqlc-generated package may only be touched by a module's postgres.go adapter.
        db-isolation:
          files:
            - "**/internal/**"
            - "!**/postgres.go"
            - "!**/internal/platform/database/**"
          deny:
            - pkg: github.com/plorigo/plorigo/internal/platform/database/db
              desc: "internal/platform/database/db (sqlc) may only be imported from a module's postgres.go"
        # Modules must not import each other. Cross-module collaboration goes through a
        # consumer-defined port (or a neutral platform package like authz/principal)
        # wired in internal/app. Adding a module = add its dir to files and its package
        # to deny. See docs/architecture/modules.md.
        module-boundaries:
          files:
            - "**/internal/agents/**"
            - "**/internal/audit/**"
            - "**/internal/backups/**"
            - "**/internal/auth/**"
            - "**/internal/config/**"
            - "**/internal/deployments/**"
            - "**/internal/domains/**"
            - "**/internal/environments/**"
            - "**/internal/membership/**"
            - "**/internal/policy/**"
            - "**/internal/projects/**"
            - "**/internal/readiness/**"
            - "**/internal/servers/**"
            - "**/internal/serversetup/**"
            - "**/internal/services/**"
            - "**/internal/sources/**"
          deny:
            - pkg: github.com/plorigo/plorigo/internal/agents
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
            - pkg: github.com/plorigo/plorigo/internal/audit
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
            - pkg: github.com/plorigo/plorigo/internal/backups
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
            - pkg: github.com/plorigo/plorigo/internal/auth
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
            - pkg: github.com/plorigo/plorigo/internal/config
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
            - pkg: github.com/plorigo/plorigo/internal/deployments
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
            - pkg: github.com/plorigo/plorigo/internal/domains
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
            - pkg: github.com/plorigo/plorigo/internal/environments
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
            - pkg: github.com/plorigo/plorigo/internal/membership
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
            - pkg: github.com/plorigo/plorigo/internal/policy
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
            - pkg: github.com/plorigo/plorigo/internal/projects
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
            - pkg: github.com/plorigo/plorigo/internal/readiness
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
            - pkg: github.com/plorigo/plorigo/internal/servers
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
            - pkg: github.com/plorigo/plorigo/internal/serversetup
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
            - pkg: github.com/plorigo/plorigo/internal/services
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
            - pkg: github.com/plorigo/plorigo/internal/sources
              desc: "modules must not import each other; use a consumer-defined port wired in internal/app"
  exclusions:
    generated: lax
    paths:
      - proto/gen
      - internal/platform/database/db

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/plorigo/plorigo
